name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/oficina-api

jobs:
  build-and-test:
    name: Build e testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec eslint "src/**/*.ts"

      - name: Testes unitários
        run: pnpm test

      - name: Build da aplicação
        run: pnpm build

  docker-image:
    name: Build e push da imagem Docker
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy no Kubernetes (kind)
    runs-on: ubuntu-latest
    needs: docker-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Criar cluster kind
        uses: helm/kind-action@v1
        with:
          cluster_name: oficina

      - name: Aplicar manifestos (namespace, config, banco, mailhog)
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/mailhog.yaml
          kubectl -n oficina rollout status deployment/postgres --timeout=180s

      - name: Secret de pull do GHCR
        run: |
          kubectl -n oficina create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy da API com a imagem recém-publicada
        run: |
          kubectl apply -f k8s/api-deployment.yaml
          kubectl apply -f k8s/api-hpa.yaml
          kubectl -n oficina set image deployment/oficina-api api=${{ env.IMAGE_NAME }}:${{ github.sha }}
          kubectl -n oficina rollout status deployment/oficina-api --timeout=300s

      - name: Smoke test
        run: |
          kubectl -n oficina port-forward svc/oficina-api 8080:80 &
          sleep 5
          curl --fail --retry 5 --retry-delay 3 http://localhost:8080/api/health
