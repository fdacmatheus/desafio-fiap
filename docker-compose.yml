services:
  db:
    image: postgres:16-alpine
    container_name: oficina-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-oficina}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-oficina}
      POSTGRES_DB: ${DB_NAME:-oficina}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - oficina-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-oficina} -d ${DB_NAME:-oficina}']
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: oficina-pgadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@oficina.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    volumes:
      - oficina-pgadmin-data:/var/lib/pgadmin

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oficina-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-oficina}
      DB_PASSWORD: ${DB_PASSWORD:-oficina}
      DB_NAME: ${DB_NAME:-oficina}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      AUTO_SEED: ${AUTO_SEED:-true}
    ports:
      - '${PORT:-3000}:3000'

volumes:
  oficina-db-data:
  oficina-pgadmin-data:
